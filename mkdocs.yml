site_name: AccordionQ2 Python Client
site_description: Python client library for the AccordionQ2 Hardware Management REST API
site_url: https://esharp-accordion-projects-webapiclient-python.readthedocs.io/en/latest/
repo_url: https://github.com/esharpab/esharp-accordion-projects-webapiclient-python
repo_name: GitHub

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - API Reference:
      - Overview: api/overview.md
      - Connection: api/connection.md
      - Resources: api/resources.md
      - Channels: api/channels.md
      - Modules: api/modules.md
      - Application: api/application.md
      - Media: api/media.md
      - Comm (Bus Transactions): api/comm.md
      - Numeric Results: api/numeric-results.md
  - Models & Enums:
      - Models: reference/models.md
      - Enumerations: reference/enums.md
  - Error Handling: error-handling.md
  - Testing: testing.md
  - .NET Comparison: dotnet-comparison.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/accordionq2/
      name: PyPI
